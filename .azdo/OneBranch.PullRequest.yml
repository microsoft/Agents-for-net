#################################################################################
#                      OneBranch Pipelines - PR Build                           #
# This pipeline was created by EasyStart from a sample located at:              #
#   https://aka.ms/obpipelines/easystart/samples                                #
# Documentation:  https://aka.ms/obpipelines                                    #
# Yaml Schema:    https://aka.ms/obpipelines/yaml/schema                        #
# Retail Tasks:   https://aka.ms/obpipelines/tasks                              #
# Support:        https://aka.ms/onebranchsup                                   #
#                                                                               #
#################################################################################

trigger: none # https://aka.ms/obpipelines/triggers

parameters: # parameters are shown up in ADO UI in a build queue time
- name: 'debug'
  displayName: 'Enable debug output'
  type: boolean
  default: false

variables:
  CDP_DEFINITION_BUILD_COUNT: $[counter('', 0)] # needed for onebranch.pipeline.version task https://aka.ms/obpipelines/versioning
  MAJOR: 1
  MINOR: 1
  BUILD: 0
  REVISION: $[counter(variables['REVISION'], 20)]
  system.debug: ${{ parameters.debug }}
  ENABLE_PRS_DELAYSIGN: 0
  ROOT: $(Build.SourcesDirectory)
  REPOROOTDIRECTORY: $(Build.SourcesDirectory)
  OUTPUTROOT: $(REPOROOTDIRECTORY)\bin
  NUGET_XMLDOC_MODE: none
  EnableLocalization: true
  ProjectFolder : "agnts"
  system_accesstoken: $(System.AccessToken)

  WindowsContainerImage: 'onebranch.azurecr.io/windows/ltsc2019/vse2022:latest' # https://aka.ms/obpipelines/containers

resources:
  repositories:
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main
    - repository: tools
      type: github
      endpoint: bic-proxima-shared-stamp
      name: bic/Microsoft.Botframework.Builds
      ref: refs/heads/main

extends:
  template: v2/OneBranch.NonOfficial.CrossPlat.yml@templates
  parameters:
    globalSdl:
      tsa:
        enabled: false
      binskim:
        break: true
      policheck:
        break: true

    stages:
    - stage: Build_Assets
      jobs:
      # ----------------------------------------------------------------------------
      # Definition 1 ("Templates"): runs first.
      # Owns everything that only requires the OneBranch governed 'templates' repo /
      # environment prep (checkout, auth, tool restore). It stages the checked-out
      # sources into ob_outputDirectory so OneBranch auto-publishes them as the
      # pipeline artifact 'drop_Build_Assets_Templates', which the 'Tools' job
      # consumes downstream.
      # ----------------------------------------------------------------------------
      - job: Templates
        pool:
          type: windows
        variables:
          ob_outputDirectory: '$(Build.ArtifactStagingDirectory)/ONEBRANCH_ARTIFACT'
          ob_git_fetchDepth: -1
        steps:
          - checkout: self
            path: s/$(ProjectFolder)
          - checkout: tools
            path: s/tools
          - task: NuGetAuthenticate@1
          - script: dotnet tool restore
            displayName: Dotnet tools restore
            workingDirectory: $(Build.SourcesDirectory)
            env:
              ob_restore_phase: true

          # Stage the checked-out sources so they flow to the downstream 'Tools' job.
          - task: CopyFiles@2
            displayName: "Stage self sources for downstream 'Tools' job"
            inputs:
              SourceFolder: '$(Pipeline.Workspace)/s/$(ProjectFolder)'
              Contents: '**'
              TargetFolder: '$(ob_outputDirectory)/sources/$(ProjectFolder)'
          - task: CopyFiles@2
            displayName: "Stage tools sources for downstream 'Tools' job"
            inputs:
              SourceFolder: '$(Pipeline.Workspace)/s/tools'
              Contents: '**'
              TargetFolder: '$(ob_outputDirectory)/sources/tools'

      # ----------------------------------------------------------------------------
      # Definition 2 ("Tools"): runs last (dependsOn Templates).
      # Consumes the sources published by the 'Templates' job, then runs the 'tools'
      # repo build-sign-package template and copies the produced packages/logs into
      # ONEBRANCH_ARTIFACT for publishing. Keeps the original build behavior intact.
      # ----------------------------------------------------------------------------
      - job: Tools
        dependsOn: Templates
        pool:
          type: windows
        variables:
          ob_outputDirectory: '$(Build.ArtifactStagingDirectory)/ONEBRANCH_ARTIFACT'
          ob_sdl_binskim_break: true
          ob_git_fetchDepth: -1
        steps:
          # Rely on the artifact from the 'Templates' job instead of re-checking out.
          - checkout: none

          - download: current
            artifact: drop_Build_Assets_Templates
            displayName: "Download staged sources from 'Templates' job"

          # Restore the sources into the workspace paths expected by the build template.
          - task: CopyFiles@2
            displayName: 'Restore self sources from Templates artifact'
            inputs:
              SourceFolder: '$(Pipeline.Workspace)/drop_Build_Assets_Templates/sources/$(ProjectFolder)'
              Contents: '**'
              TargetFolder: '$(Pipeline.Workspace)/s/$(ProjectFolder)'
          - task: CopyFiles@2
            displayName: 'Restore tools sources from Templates artifact'
            inputs:
              SourceFolder: '$(Pipeline.Workspace)/drop_Build_Assets_Templates/sources/tools'
              Contents: '**'
              TargetFolder: '$(Pipeline.Workspace)/s/tools'

          # Env prep must be repeated because each job runs on a fresh agent; this keeps
          # the build functionally identical to the original single-job pipeline.
          - task: NuGetAuthenticate@1
          - script: dotnet tool restore
            displayName: Dotnet tools restore
            workingDirectory: $(Pipeline.Workspace)\s\$(ProjectFolder)
            env:
              ob_restore_phase: true

          - template: Agents-dotnet/.pipelines/templates/build-sign-package.yaml@tools
            parameters:
              configuration: debug
              rootProjectFolder: $(Pipeline.Workspace)\s\$(ProjectFolder)   # -> ...\src\libraries exists
              isOfficialBuild: false
              OutputDirectoryRoot: '$(OUTPUTROOT)'

          - task: CopyFiles@2
            displayName: "Copy Files for 'Publish packages (Debug)' publish task"
            inputs:
              SourceFolder: '$(Pipeline.Workspace)\bin'
              Contents: '**/*.nupkg'
              FlattenFolders : true
              TargetFolder: $(Build.ArtifactStagingDirectory)/ONEBRANCH_ARTIFACT/packagesDebug
            condition: always()

          - task: CopyFiles@2
            displayName: "Copy Files for 'Publish diagnostic build logs (Debug)' publish task"
            inputs:
              SourceFolder: 'bin\logs'
              Contents: '**'
              TargetFolder: $(Build.ArtifactStagingDirectory)/ONEBRANCH_ARTIFACT/diagnosticLogs
            condition: always()
