name: Verify sequence diagrams

# Weekly (and on-demand) audit of the Mermaid sequence diagrams under docs/ against the
# actual implementation. When a diagram has drifted from the code, the GitHub Copilot CLI
# corrects the affected docs/*sequence-diagram.md files locally and this workflow opens a
# GitHub issue per changed diagram containing the proposed fix (as a diff) for a maintainer
# to implement (e.g. via @copilot). Nothing is committed or pushed. Opening issues only
# needs GITHUB_TOKEN with issues:write, which sidesteps the operations Microsoft enterprise
# Actions policy blocks: PAT-authenticated git/PR operations from runners, and GITHUB_TOKEN
# pull-request creation. (The COPILOT_CLI_PAT is still used, but only for Copilot model
# authentication, which is unaffected.) When everything already matches, the run is a no-op
# and no issue is created.

on:
  schedule:
    # 08:00 UTC every Monday (~1am PST)
    - cron: "0 8 * * 1"
  workflow_dispatch:

concurrency:
  group: verify-sequence-diagrams
  cancel-in-progress: false

permissions:
  # The audit reads the repo (checkout) and files issues describing diagram drift.
  # No branch push or PR creation happens, so no PAT / GitHub App is required.
  contents: read
  issues: write

jobs:
  verify-diagrams:
    name: Audit sequence diagrams
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install GitHub Copilot CLI
        run: npm install -g @github/copilot

      - name: Install Mermaid CLI
        run: |
          npm install -g @mermaid-js/mermaid-cli
          echo '{ "args": ["--no-sandbox"] }' > /tmp/puppeteer-config.json

      - name: Audit diagrams against implementation
        env:
          # Fine-grained PAT with Copilot access. Stored as the COPILOT_CLI_PAT secret.
          # COPILOT_GITHUB_TOKEN authenticates the model; GH_TOKEN is used for gh/git.
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_PAT }}
          GH_TOKEN: ${{ secrets.COPILOT_CLI_PAT }}
        run: |
          set -o pipefail
          copilot \
            --allow-all-tools \
            --log-level none \
            -p "$(cat .github/prompts/verify-sequence-diagrams.prompt.md)" \
            2>&1 | tee copilot-output.log

      # Lint the (possibly edited) diagrams. If the audit introduced invalid Mermaid,
      # feed the exact parser errors back to Copilot to auto-fix, then re-lint. This
      # avoids both opening a PR with broken diagrams and hard-failing the whole run on
      # the first mistake. Only if Copilot still can't produce valid Mermaid after a
      # bounded number of attempts does the job fail (see "Fail if diagrams invalid").
      - name: Lint diagrams and self-correct
        id: lint
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_PAT }}
          GH_TOKEN: ${{ secrets.COPILOT_CLI_PAT }}
        run: |
          # Maximum number of Copilot fix attempts after the initial audit.
          max_fixups=2
          mkdir -p /tmp/mermaid-lint

          # Lint every diagram, collecting parser errors into lint-errors.log.
          # Returns non-zero if any diagram is invalid.
          lint_diagrams() {
            local rc=0
            : > lint-errors.log
            for f in docs/*sequence-diagram.md; do
              echo "::group::Linting $f"
              if out=$(mmdc -i "$f" -o "/tmp/mermaid-lint/$(basename "$f").svg" \
                  -p /tmp/puppeteer-config.json 2>&1); then
                echo "$out"
              else
                echo "$out"
                echo "::error file=$f::Invalid Mermaid syntax in $f"
                { echo "## $f"; echo "$out"; echo; } >> lint-errors.log
                rc=1
              fi
              echo "::endgroup::"
            done
            return $rc
          }

          attempt=0
          while true; do
            if lint_diagrams; then
              echo "All Mermaid diagrams are valid."
              echo "status=success" >> "$GITHUB_OUTPUT"
              break
            fi
            if [ "$attempt" -ge "$max_fixups" ]; then
              echo "::error::Mermaid diagrams are still invalid after $attempt self-correction attempt(s)."
              echo "status=failed" >> "$GITHUB_OUTPUT"
              break
            fi
            attempt=$((attempt + 1))
            echo "::warning::Invalid Mermaid detected; asking Copilot to fix it (attempt $attempt/$max_fixups)."
            fix_prompt="$(cat .github/prompts/fix-mermaid-syntax.prompt.md)

          === MERMAID LINT ERRORS ===
          $(cat lint-errors.log)"
            copilot \
              --allow-all-tools \
              --log-level none \
              -p "$fix_prompt" \
              2>&1 | tee -a copilot-output.log
          done

      - name: Open issues for changed diagrams
        if: steps.lint.outputs.status == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Diagrams the audit actually modified — i.e. those that drifted from the code.
          mapfile -t changed < <(git diff --name-only -- 'docs/*sequence-diagram.md')
          if [ "${#changed[@]}" -eq 0 ]; then
            echo "No diagram drift detected; nothing to file."
            exit 0
          fi

          # Audit summary block (content after the LAST marker; Copilot may run more than
          # once due to the self-correction loop).
          if grep -q "=== DIAGRAM AUDIT SUMMARY ===" copilot-output.log; then
            tac copilot-output.log | sed -n '/=== DIAGRAM AUDIT SUMMARY ===/q;p' | tac > audit-summary.txt
          else
            : > audit-summary.txt
          fi

          for f in "${changed[@]}"; do
            title="docs: sequence diagram drift in $f"

            # Avoid re-filing the same drift on every weekly run: skip if an open issue
            # with this exact title already exists.
            existing=$(gh issue list --state open --search "\"$title\" in:title" \
              --json title --jq "map(select(.title == \"$title\")) | length")
            if [ "$existing" != "0" ]; then
              echo "Open issue already exists for $f; skipping."
              continue
            fi

            # Per-file line from the audit summary, if present.
            note=$(grep -F "$f" audit-summary.txt || true)

            {
              echo "The weekly \`verify-sequence-diagrams\` audit found that **\`$f\`** has drifted from the current implementation. The code is the source of truth; the diagram is what should be corrected."
              echo ""
              echo "## What the audit found"
              echo ""
              if [ -n "$note" ]; then
                echo "$note"
              else
                echo "_See the proposed change below._"
              fi
              echo ""
              echo "## Proposed fix"
              echo ""
              echo "The audit produced the following change (validated as parseable Mermaid before filing):"
              echo ""
              echo '````diff'
              git --no-pager diff -- "$f"
              echo '````'
              echo ""
              echo "## How to apply"
              echo ""
              echo "Comment \`@copilot implement the proposed fix in this issue\`, or apply the diff manually. Keep the Mermaid syntax valid and preserve the file's UTF-8 BOM."
              echo ""
              echo "_Filed automatically by the [\`verify-sequence-diagrams\`](.github/workflows/verify-sequence-diagrams.yml) workflow. The audit is best-effort — verify against the code before merging._"
            } > issue-body.md

            url=$(gh issue create --title "$title" --body-file issue-body.md)
            echo "Opened issue for $f: $url"
            # Labeling is best-effort; don't fail the run if the label is missing.
            gh issue edit "$url" --add-label "Documentation" 2>/dev/null || true
          done

      - name: Fail if diagrams invalid
        if: steps.lint.outputs.status == 'failed'
        run: |
          echo "Copilot could not produce valid Mermaid after the allotted self-correction attempts." >&2
          echo "See the 'Lint diagrams and self-correct' step logs for the parser errors." >&2
          exit 1
